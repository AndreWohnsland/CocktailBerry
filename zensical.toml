[project]
site_name = "CocktailBerry: Open Source Cocktail Machine Software"
site_description = "Official CocktailBerry Documentation: Open Source Software to easily build your own automated cocktail machine."
site_author = "Andre Wohnsland"
copyright = "&copy; Copyright 2026, Andre Wohnsland & contributors"
repo_url = "https://github.com/AndreWohnsland/CocktailBerry"
repo_name = "GitHub Cocktailberry"

nav = [
  { "Home" = "index.md" },
  { "About" = "about.md" },
  { "Getting Started" = [
    { "Installation" = "installation.md" },
    { "Hardware" = "hardware.md" },
    { "Setup & Usage" = "setup.md" },
    { "CocktailBerry Web" = "web.md" },
  ]},
  { "Features" = [
    { "Payment Feature" = "payment.md" },
    { "Service Personnel" = "waiter.md" },
    { "Addons" = "addons.md" },
    { "HW Extensions" = [
      "hardware-extensions/index.md",
      { "Context Extensions" = "hardware-extensions/hardware-context.md" },
      { "Scales" = "hardware-extensions/scales.md" },
      { "Carriages" = "hardware-extensions/carriages.md" },
      { "RFID Readers" = "hardware-extensions/rfid.md" },
      { "LEDs" = "hardware-extensions/leds.md" },
      { "Dispensers" = "hardware-extensions/dispensers.md" },
    ]},
    { "Advanced Topics" = "advanced.md" },
  ]},
  { "Reference" = [
    { "CLI commands" = "commands.md" },
    { "Supported Languages" = "languages.md" },
    { "Feature Timetable" = "features.md" },
  ]},
  { "Help" = [
    { "Troubleshooting" = "troubleshooting.md" },
    { "FAQ" = "faq.md" },
    { "Migration Guides" = [
      "migration/index.md",
      { "v3 Update" = "migration/v3.md" },
      { "v4 Update" = "migration/v4.md" },
    ]},
  ]},
  { "Project" = [
    { "Development" = "development.md" },
    { "How to Support" = "support.md" },
  ]},
]

extra_css = ["stylesheets/extra.css"]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

# Tag identifiers, icons are assigned under [project.theme.icon.tag].
[project.extra.tags]
Setup = "setup"
Hardware = "hardware"
Feature = "feature"
Extension = "extension"
Reference = "reference"
Help = "help"
Migration = "migration"
Project = "project"

[project.theme]
variant = "modern"
custom_dir = "docs/overrides"
logo = "img/berry.svg"
favicon = "img/favicon.ico"
features = [
  "navigation.sections",
  "navigation.footer",
  "content.code.copy",
  "content.code.annotate",
  "announce.dismiss",
  "content.tabs.link",
  "navigation.indexes",
  "content.tooltips",
]

[project.theme.icon.tag]
default = "material/tag-outline"
setup = "material/rocket-launch"
hardware = "material/chip"
feature = "material/star-outline"
extension = "material/puzzle-outline"
reference = "material/book-open-variant"
help = "material/chat-question-outline"
migration = "material/arrow-up-bold-hexagon-outline"
project = "material/account-group"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Switch to light mode"

# Footer link to the main CocktailBerry website.
[[project.extra.social]]
icon = "material/web"
link = "https://cocktailberry.org"
name = "CocktailBerry"

# Footer link to the hardware documentation.
[[project.extra.social]]
icon = "material/hammer-wrench"
link = "https://hardware.cocktailberry.org"
name = "Hardware Docs"

# Since we customize superfences and tabbed, we must explicitly define all extensions
# https://zensical.org/docs/setup/extensions/#default-configuration-zensicaltoml
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = "#"
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
# Reusable doc fragments (shared admonitions, notes) live in docs/.snippets.
# Include one on its own line with:  --8<-- "all_in_one.md"
base_path = ["docs/.snippets"]
check_paths = true # fail the build on a missing snippet instead of silently skipping
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
slugify = { function = "pymdownx.slugs.slugify", kwds = { case = "lower" } }
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# Enable the macros plugin so pages can interpolate shared values from extra.*
# (Jinja2), e.g. {{ extra.pi_5_link }}.
[project.plugins.macros]
config = {}

