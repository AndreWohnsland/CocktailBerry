# Language file to have a lookup for different supported language
# Implement new languages here, please use two digits country code
# Try to implement for each option the according language
# identical to the existing structure
# Template variables (indicated with {variable_name}) should use IDENTICAL names and brackets!

##### GENERIC POP UP DIALOGS #####
# All for dialog windows
dialog:
  box_title:
    en: 'Information'
    de: 'Information'
    pl: 'Informacja'
  wrong_password:
    en: 'Wrong Password!'
    de: 'Falsches Passwort!'
    pl: 'Nieprawidłowe hasło!'
  done:
    en: 'Done!'
    de: 'Fertig!'
    pl: 'Gotowe!'
  bottles_renewed:
    en: 'Renewed selected bottles!'
    de: 'Ausgewählte Flaschen erneuert!'
    pl: 'Wybrane butelki zostały uzupełnione!'
  bottle_updated:
    en: 'Bottle {bottle_id} updated successfully to {amount} of ingredient {ingredient_id}!'
    de: 'Flasche {bottle_id} erfolgreich auf {amount} von Zutat {ingredient_id} aktualisiert!'
    pl: 'Butelka {bottle_id} została pomyślnie zaktualizowana do {amount} składnika {ingredient_id}!'
  bottle_calibration_started:
    en: 'Bottle {bottle_id} calibration to {amount} started!'
    de: 'Flasche {bottle_id} Kalibrierung auf {amount} gestartet!'
    pl: 'Rozpoczęto kalibrację butelki {bottle_id} do {amount}!'
  no_scale_available:
    en: 'No scale available'
    de: 'Keine Waage verfügbar'
    pl: 'Brak dostępnej wagi'
  scale_tared:
    en: 'Scale tared successfully'
    de: 'Waage erfolgreich tariert'
    pl: 'Waga została wytarowana'
  scale_calibrated:
    en: 'Scale calibrated, new factor: {factor}'
    de: 'Waage kalibriert, neuer Faktor: {factor}'
    pl: 'Waga skalibrowana, nowy współczynnik: {factor}'
  scale_known_weight_positive:
    en: 'Known weight must be positive'
    de: 'Bekanntes Gewicht muss positiv sein'
    pl: 'Znana waga musi być większa od zera'
  no_recipe_selected:
    en: 'No recipe selected!'
    de: 'Kein Rezept ausgewählt!'
    pl: 'Nie wybrano przepisu!'
  no_ingredient_selected:
    en: 'No ingredient selected!'
    de: 'Keine Zutat ausgewählt!'
    pl: 'Nie wybrano składnika!'
  ingredient_still_at_bottle:
    en: 'Error, the ingredient is still used at a bottle!'
    de: 'Fehler, die Zutat ist noch in der Belegung registriert!'
    pl: 'Błąd, składnik jest nadal używany w butelce!'
  ingredient_still_in_available:
    en: 'Error, the ingredient is still registered at available ingredients!'
    de: 'Fehler, die Zutat ist noch unter den verfügbaren Zutaten registriert!'
    pl: 'Błąd, składnik nadal jest na liście dostępnych składników!'
  ingredient_still_at_recipe:
    en: "Ingredient can not be deleted, it is still used at:\n<{recipe_string}>"
    de: "Zutat kann nicht gelöscht werden, da sie in:\n<{recipe_string}>\ngenutzt wird"
    pl: "Nie można usunąć składnika, jest używany w:\n<{recipe_string}>"
  ingredient_still_as_machine_add:
    en: "Ingredient can not be changed to hand add, it is still used as machine add at:\n{recipe_list}"
    de: "Zutat kann nicht auf Hand geändert werden, da sie in:\n{recipe_list}\nmit der Maschine genutzt wird"
    pl: "Nie można zmienić składnika na dodawanie ręczne, nadal jest używany automatycznie w:\n{recipe_list}"
  ingredient_double_usage:
    en: "One of the ingredient\n<{ingredient_name}>\nwas used multiple times!"
    de: "Eine der Zutaten:\n<{ingredient_name}>\nwurde doppelt verwendet!"
    pl: "Składnik\n<{ingredient_name}>\nzostał użyty wielokrotnie!"
  ingredient_deleted:
    en: "Ingredient:\n<{ingredient_name}>\ndeleted"
    de: "Zutat mit dem Namen:\n<{ingredient_name}>\ngelöscht!"
    pl: "Składnik:\n<{ingredient_name}>\nzostał usunięty"
  ingredient_added:
    en: "Ingredient\n<{ingredient_name}>\nentered"
    de: "Zutat mit dem Namen:\n<{ingredient_name}>\neingetragen"
    pl: "Dodano składnik:\n<{ingredient_name}>"
  ingredient_changed:
    en: "Ingredient\n<{selected_ingredient}>\nwas updated to\n<{ingredient_name}>"
    de: "Zutat\n<{selected_ingredient}>\nnach\n<{ingredient_name}>\naktualisiert"
    pl: "Składnik\n<{selected_ingredient}>\nzostał zmieniony na\n<{ingredient_name}>"
  available_ingredient_updated:
    en: 'Available ingredients were updated!'
    de: 'Verfügbare Zutaten wurden aktualisiert!'
    pl: 'Dostępne składniki zostały zaktualizowane!'
  cocktail_canceled:
    en: 'The cocktail was cancelled!'
    de: 'Der Cocktail wurde abgebrochen!'
    pl: 'Koktajl został anulowany!'
  no_waiter_logged_in:
    en: 'No service personnel is logged in. Please scan your NFC tag first.'
    de: 'Kein Servicepersonal angemeldet. Bitte zuerst den NFC-Tag scannen.'
    pl: 'Brak zalogowanej obsługi. Najpierw zeskanuj tag NFC.'
  cocktail_ready:
    en: 'The cocktail is ready. Please wait a moment, for the rest of the fluid to flow in.{full_comment}'
    de: 'Der Cocktail ist fertig! Bitte kurz warten, falls noch etwas nach tropft.{full_comment}'
    pl: 'Koktajl jest gotowy. Poczekaj chwilę, aż reszta płynu spłynie.{full_comment}'
  cocktail_ready_add:
    en: 'Also add:'
    de: 'Noch hinzufügen:'
    pl: 'Dodaj również:'
  cocktail_not_possible:
    en: 'Cocktail is not possible to make, not all ingredients are available!'
    de: 'Cocktail zubereiten ist nicht möglich, nicht alle Zutaten sind verfügbar!'
    pl: 'Nie można przygotować koktajlu – brakuje składników!'
  enter_cocktail_name:
    en: 'Please enter cocktail name!'
    de: 'Bitte Cocktail Namen eingeben!'
    pl: 'Wprowadź nazwę koktajlu!'
  recipe_deleted:
    en: "Recipe\n<{recipe_name}>\nwas deleted"
    de: "Rezept mit dem Namen\n<{recipe_name}>\nwurde gelöscht!"
    pl: "Przepis\n<{recipe_name}>\nzostał usunięty"
  all_recipes_enabled:
    en: 'All recipes are enabled!'
    de: 'Alle Rezepte wurden wieder aktiv gesetzt!'
    pl: 'Wszystkie przepisy zostały włączone!'
  recipe_added:
    en: "Recipe\n<{recipe_name}>\nwas added!"
    de: "Rezept unter dem Namen:\n<{recipe_name}>\neingetragen!"
    pl: "Dodano przepis:\n<{recipe_name}>"
  recipe_updated:
    en: "Recipe\n<{old_name}>\nupdated to\n<{new_name}>"
    de: "Rezept\n<{old_name}>\nnach\n<{new_name}>\naktualisiert!"
    pl: "Przepis\n<{old_name}>\nzostał zmieniony na\n<{new_name}>"
  recipe_at_least_one_ingredient:
    en: 'You need to use at least one ingredient!'
    de: 'Es muss mindestens eine Zutat eingetragen sein!'
    pl: 'Musisz użyć co najmniej jednego składnika!'
  all_data_exported:
    en: 'All data was exported and amount was reset!'
    de: 'Alle Daten wurden exportiert und die Mengen zurückgesetzt!'
    pl: 'Dane zostały wyeksportowane, a wartości zresetowane!'
  not_enough_ingredient_volume:
    en: '{ingredient_name} has not enough volume! {volume} ml is needed, only {level} ml left. Please refill the bottle.'
    de: '{ingredient_name} hat nicht genug Volumen! {volume} ml benötigt aber nur {level} ml vorhanden. Bitte Flasche auffüllen.'
    pl: '{ingredient_name} jest za mało! Potrzebne jest {volume} ml, a jest dostępne tylko {level} ml. Uzupełnij butelkę.'
  bottle_tab_locked:
    en: 'The bottle tab is locked, please inform a person with permission.'
    de: 'Der Flaschen Tab ist gesperrt, bitte informiere eine berechtigte Person.'
    pl: 'Zakładka "Butelki" jest zablokowana, poinformuj uprawnioną osobę.'
  name_already_exists:
    en: 'This name is already used!'
    de: 'Dieser Name wurde bereits verwendet!'
    pl: 'Ta nazwa jest już używana!'
  some_value_missing:
    en: 'At least one value is missing!'
    de: 'Irgendwo ist ein Wert vergessen worden!'
    pl: 'Brakuje co najmniej jednej wartości!'
  some_value_missing_specific:
    en: '{value} is missing!'
    de: '{value} wurde vergessen!'
    pl: 'Brakuje wartości: {value}!'
  needs_to_be_int:
    en: 'Wrong value for a number field!'
    de: 'Falscher Wert für ein Zahlenfeld'
    pl: 'Nieprawidłowa wartość w polu liczbowym!'
  needs_to_be_int_specific:
    en: '{value} needs to be a number!'
    de: '{value} muss eine ganze Zahl sein!'
    pl: '{value} musi być liczbą!'
  alcohol_level_max_limit:
    en: 'Alcohol level can not exceed 100 percent!'
    de: 'Alkoholgehalt kann nicht größer als 100 Prozent sein!'
    pl: 'Zawartość alkoholu nie może przekraczać 100%!'
  update_available:
    en: 'There is a new update available. Do you want to pull it from GitHub? The program will be restarted afterwards.'
    de: 'Es ist ein neues Update verfügbar. Update von GitHub pullen? Das Programm wird danach neu gestartet.'
    pl: 'Dostępna jest nowa aktualizacja. Czy chcesz pobrać ją z GitHub? Program zostanie następnie uruchomiony ponownie.'
  update_available_major_warning:
    en: 'WARNING: This is a major update and have probably breaking changes.\nPlease check the changelog before updating.\nSee https://github.com/AndreWohnsland/CocktailBerry/releases for more information.'
    de: 'WARNUNG: Dies ist ein Major Update und hat wahrscheinlich Breaking Changes.\nBitte schaue dir das Changelog vor dem Update an.\nSiehe https://github.com/AndreWohnsland/CocktailBerry/releases für mehr Informationen.'
    pl: 'OSTRZEŻENIE: To jest duża aktualizacja, która może zawierać niekompatybilne zmiany.\nSprawdź changelog przed aktualizacją.\nWięcej informacji: https://github.com/AndreWohnsland/CocktailBerry/releases'
  restart_config:
    en: 'Restart the program to apply new configuration?'
    de: 'Programm neu starten, um die geänderten Einstellungen zu laden?'
    pl: 'Czy uruchomić program ponownie, aby zastosować nowe ustawienia?'
  confirmation_required:
    en: 'Confirmation required'
    de: 'Bestätigung nötig'
    pl: 'Wymagane potwierdzenie'
  yes_button:
    en: 'Yes'
    de: 'Ja'
    pl: 'Tak'
  no_button:
    en: 'No'
    de: 'Nein'
    pl: 'Nie'
  wrong_config:
    en: "At least one value is wrong in the config:\n{error}"
    de: "Mindestens ein Wert ist Fehlerhaft:\n{error}"
    pl: "Co najmniej jedna wartość w konfiguracji jest błędna:\n{error}"
  backup_failed:
    en: 'This seems to be no CocktailBerry backup folder. Please use the right folder. It needs to have some specific files. Did not find {file}.'
    de: 'Ausgewählter Ordner ist kein CocktailBerry Backup. Bitte richtigen Ordner auswählen. Es müssen einige spezifische Dateien enthalten sein. Konnte {file} nicht finden.'
    pl: 'To nie wygląda na folder kopii zapasowej CocktailBerry. Wybierz właściwy folder. Brakuje wymaganych plików. Nie znaleziono {file}.'
  update_failed:
    en: 'Update failed. Please check the logs for further information.'
    de: 'Update fehlgeschlagen. Bitte schaue in die Logs für mehr Informationen.'
    pl: 'Aktualizacja nie powiodła się. Sprawdź logi po więcej informacji.'
  ask_to_clean:
    en: 'Starting Cleaning Progress? Please provide enough water.'
    de: 'Reinigung Starten? Bitte genug Wasser bereitstellen.'
    pl: 'Rozpocząć czyszczenie? Zapewnij odpowiednią ilość wody.'
  ask_to_shutdown:
    en: 'Shutdown the System?'
    de: 'Soll das System herunter gefahren werden?'
    pl: 'Wyłączyć system?'
  ask_to_reboot:
    en: 'Reboot the System?'
    de: 'Soll das System neu gestartet werden?'
    pl: 'Uruchomić system ponownie?'
  ask_for_backup_location:
    en: 'Please select backup location.'
    de: 'Bitte Backup Ort auswählen.'
    pl: 'Wybierz lokalizację kopii zapasowej.'
  ask_for_image_location:
    en: 'Please select image location.'
    de: 'Bitte Bild Ort auswählen.'
    pl: 'Wybierz lokalizację obrazu.'
  ask_backup_overwrite:
    en: 'Load selected backup files for: "{backup_files}" in? This will overwrite local data. The program will restart afterwards.'
    de: 'Ausgewählte Backup Dateien für "{backup_files}" verwenden? Lokale Daten werden überschrieben. Ein Neustart wird danach ausgeführt.'
    pl: 'Wczytać wybrane pliki kopii zapasowej dla: "{backup_files}"? Spowoduje to nadpisanie danych lokalnych. Program zostanie uruchomiony ponownie.'
  ask_enable_all_recipes:
    en: 'Do you want to enable all recipes? All possible ones will be then shown at the maker tab.'
    de: 'Alle Rezepte aktiv setzen? Machbare Rezepte werden dann im Maker Tab angezeigt.'
    pl: 'Czy chcesz włączyć wszystkie przepisy? Wszystkie przepisy będą widoczne w zakładce Maker.'
  ask_to_delete_x:
    en: 'Do you want to delete {x}? This cannot be reverted.'
    de: 'Soll {x} gelöscht werden? Dies kann nicht rückgängig gemacht werden.'
    pl: 'Czy chcesz usunąć {x}? Tego nie można cofnąć.'
  ask_to_delete_reader:
    en: 'Do you want to delete the reader "{reader_name}"? This cannot be reverted.'
    de: 'Soll der Reader "{reader_name}" gelöscht werden? Dies kann nicht rückgängig gemacht werden.'
    pl: 'Czy chcesz usunąć czytnik "{reader_name}"? Tego nie można cofnąć.'
  ask_to_remove_picture:
    en: 'Do you want to remove the user picture? This cannot be reverted.'
    de: 'Soll das User Bild entfernt werden? Dies kann nicht rückgängig gemacht werden.'
    pl: 'Czy chcesz usunąć zdjęcie użytkownika? Tego nie można cofnąć.'
  ask_restricted_mode:
    en: 'Do you want to enable restricted mode? Only the cocktail maker will be accessible. You can still access configuration with the master password.'
    de: 'Möchten Sie den eingeschränkten Modus aktivieren? Nur der Cocktail-Maker wird zugänglich sein. Sie können weiterhin mit dem Master-Passwort auf die Konfiguration zugreifen.'
    pl: 'Czy chcesz włączyć tryb ograniczony? Dostępny będzie tylko Koktajl Maker. Nadal możesz uzyskać dostęp do konfiguracji za pomocą hasła głównego.'
  backup_created:
    en: 'Backup has been created at: {folder}.'
    de: 'Backup wurde unter {folder} gespeichert.'
    pl: 'Kopia zapasowa została utworzona w: {folder}.'
  ask_adjust_time:
    en: 'There seems to be no internet connection, your date/time may be wrong. This is important when sending data with the service. Do you want to adjust time?'
    de: 'Es scheint keine Internetverbindung zu bestehen, Datum/Zeit könnte falsch sein. Dies ist wichtig, wenn Daten über den Service versandt werden. Zeit anpassen?'
    pl: 'Brak połączenia z internetem, data/czas mogą być nieprawidłowe. Jest to ważne przy wysyłaniu danych. Czy chcesz ustawić czas?'
  python_deprecated:
    en: 'Your system Python is {sys_python}. In the future, {program_python} is required. Please upgrade, otherwise a future CocktailBerry update will break your program. Also, the auto update function will not show new updates until then.'
    de: 'Die Python Version des Systems is {sys_python}. In Zukunft wird {program_python} benötigt. Bitte upgrade diese bald, sonst wird mit einem kommenden Update CocktailBerry nicht mehr funktionieren. Die Autoupdate Funktion wird solange keine neuen Updates anzeigen.'
    pl: 'Twoja wersja Pythona to {sys_python}. W przyszłości wymagany będzie {program_python}. Zaktualizuj system, w przeciwnym razie aktualizacje CocktailBerry przestaną działać.'
  payment_disabled:
    en: "The payment service was disabled because of a startup issue:\n\n{reason}\n\nPlease check your configuration."
    de: "Der Zahlungsservice wurde aufgrund eines Startproblems deaktiviert:\n\n{reason}\n\nBitte überprüfe die Konfiguration."
    pl: "Usługa płatności została wyłączona z powodu problemu podczas uruchamiania:\n\n{reason}\n\nSprawdź konfigurację."
  ask_export_data:
    en: 'Export cocktail and ingredient data, as well reset possible values?'
    de: 'Cocktail und Zutaten Daten exportieren und mögliche Werte zurücksetzen?'
    pl: 'Wyeksportować dane koktajli i składników oraz zresetować wartości?'
  ask_to_system_update:
    en: 'Should the System (OS) be updated? This may take some time and will restart the system after that.'
    de: 'Soll das Betriebssystem (OS) updated werden? Das kann einige Zeit dauern und das System wird danach neu gestartet.'
    pl: 'Czy zaktualizować system operacyjny? Może to chwilę potrwać i zakończy się ponownym uruchomieniem.'
  ask_to_install_qtsass:
    en: "The Python library qtsass is needed for this feature. Since it may take 30-60 minutes building on the RPi, it was not done by the migrator.\n\nInstall and restart now? Without it can not use custom themes."
    de: "Die Python Bibliothek qtsass wird für dieses Feature benötigt. Das Bauen dieser kann 30-60 Minuten auf dem RPi benötigen, deshalb wurde dies nicht vom Migrator gemacht.\n\nSoll diese installiert und neu gestartet werden? Ohne die Bibliothek können keine Custom Themes erstellt werden."
    pl: "Do tej funkcji wymagana jest biblioteka Python qtsass. Kompilacja na RPi może trwać 30–60 minut, dlatego nie została zainstalowana automatycznie.\n\nZainstalować i uruchomić ponownie? Bez tego nie można używać własnych motywów."
  ask_to_use_reverted_pump:
    en: "Should the pump flow be reverted? This will activate the reversion pin and change the flow direction. Ingredients flagged as 'never pump back' will be skipped."
    de: "Soll die Pumpenrichtung geändert werden? Dies wird den Umkehrpin aktivieren und die Pumpenrichtung ändern. Zutaten mit 'Niemals zurück pumpen' werden übersprungen."
    pl: "Czy odwrócić kierunek pompy? Zostanie aktywowany pin zmiany kierunku przepływu. Składniki oznaczone jako 'Nigdy nie pompuj z powrotem' zostaną pominięte."
  welcome_dialog:
    en: "CocktailBerry Software Version {version} by Andre Wohnsland.\nSystem: {platform}.\nUsing python version: {python_version} with PyQt app.\n\nCheck https://docs.cocktailberry.org for more information.\n\nThere is an alternative v2 Web UI available, have a look in the documentation for more info"
    de: "CocktailBerry Software Version {version} von Andre Wohnsland.\nSystem: {platform}.\nVerwendete Python Version: {python_version} mit PyQt App.\n\nMehr Informationen unter https://docs.cocktailberry.org.\n\nEs gibt eine neue v2 Web Ui, schau in der Dokumentation für mehr Informationen."
    pl: "CocktailBerry Wersja {version} autorstwa Andre Wohnsland.\nSystem: {platform}.\nWersja Pythona: {python_version} z aplikacją PyQt.\n\nWięcej informacji: https://docs.cocktailberry.org\n\nDostępny jest alternatywny interfejs Web UI v2."
  wifi_setup_failed:
    en: 'There was an error setting up WiFi. Please check the logs for further information.'
    de: 'Es ist ein Fehler beim Einrichten des WiFi aufgetreten. Schaue in die Logs für mehr Informationen.'
    pl: 'Wystąpił błąd podczas konfiguracji WiFi. Sprawdź logi.'
  wifi_success:
    en: 'WiFi has been set up successfully.'
    de: 'WiFi wurde erfolgreich eingerichtet.'
    pl: 'WiFi zostało skonfigurowane pomyślnie.'
  wifi_failure:
    en: "There is still no internet connection.\nCheck your credentials, ssid: {ssid}, password: {password}\nIf they are correct, wait shortly then check internet again via the option feature or restart system and consult the logs."
    de: "Es besteht noch keine Internetverbindung.\nPrüfe deine Eingabe: ssid: {ssid}, password: {password}\nWenn diese stimmen, warte kurz und prüfe dein Internet über die Optionen noch einmal oder starte das System neu und schau auch in die Logs."
    pl: "Brak połączenia z internetem.\nSprawdź dane: ssid: {ssid}, hasło: {password}\nJeśli są poprawne, odczekaj chwilę i sprawdź ponownie lub uruchom system."
  internet_connection_ok:
    en: 'There is a internet connection.'
    de: 'Es besteht eine Internetverbindung.'
    pl: 'Jest połączenie z internetem.'
  internet_connection_not_ok:
    en: 'X There is no internet connection.'
    de: 'X Es besteht keine Internetverbindung.'
    pl: 'X Brak połączenia z internetem.'
  qtsass_not_successful:
    en: 'The package qtsass could not be installed. Try running "[sudo] pip install qtsass" (sudo only, if program is executed with sudo python) and wait until its done.'
    de: 'Das qtsass Paket konnte nicht installiert werden. Versuche "[sudo] pip install qtsass" (sudo nur, wenn das program mit sudo python ausgeführt wird) auszuführen und warte, bis die installation abgeschlossen ist.'
    pl: 'Pakiet qtsass nie mógł zostać zainstalowany. Spróbuj uruchomić "[sudo] pip install qtsass" (sudo tylko jeśli program uruchamiany jest przez sudo python) i poczekaj aż zakończy instalację.'
  cocktailberry_up_to_date:
    en: 'You are running the latest version of CocktailBerry.'
    de: 'Du hast die neuste Version von CocktailBerry.'
    pl: 'Używasz najnowszej wersji CocktailBerry.'
  create_cocktail_first:
    en: 'No Cocktail selected, select the one you want to add a picture. Please create the cocktail first before adding a picture to it!'
    de: 'Kein Cocktail ausgewählt, wähle einen Cocktail aus, um ein Bild hinzuzufügen. Bitte erst den Cocktail erstellen, bevor ein Bild hinzugefügt wird!'
    pl: 'Nie wybrano koktajlu, wybierz koktajl do którego chcesz dodać obraz. Przed dodaniem zdjęcia najpierw utwórz koktajl!'
  image_processing_failed:
    en: 'Image processing failed. Please ensure that you use a jpg or png file.'
    de: 'Bildverarbeitung fehlgeschlagen. Bitte stelle sicher, dass du eine jpg oder png Datei verwendest.'
    pl: 'Przetwarzanie obrazu nie powiodło się. Upewnij się, że używasz pliku jpg lub png.'
  recipe_help:
    en: 'Here you can add a Cocktail. You need the ingredient and according amount. You can assign a number from 1-9 to each ingredient. Ingredients with the same number will be spend at the same time by the machine in increasing order. Leave all at 1 if all should spend in parallel. You can also assign a picture to existing cocktails. Cocktails not enabled will not appear in the maker. If you enable virgin, a non alcoholic version of the cocktail will be possible.'
    de: 'Hier kannst du einen Cocktail hinzufügen. Du benötigst die Zutat und die entsprechende Menge. Du kannst jeder Zutat eine Nummer von 1-9 zuweisen. Zutaten mit der gleichen Nummer werden der Größe aufsteigend gleichzeitig von der Maschine ausgegeben. Lass alle auf 1, wenn alle auf einmal ausgegeben werden sollen. Du kannst auch ein Bild zu existierenden Cocktails hinzufügen. Nicht aktivierte Cocktails werden nicht im Maker angezeigt. Wenn du Virgin aktivierst, wird eine alkoholfreie Version des Cocktails möglich sein.'
    pl: 'Tutaj możesz dodać koktajl. Potrzebujesz składnika i odpowiedniej ilości. Możesz przypisać każdemu składnikowi numer od 1 do 9. Składniki z tym samym numerem będą podawane jednocześnie w kolejności rosnącej. Zostaw 1 dla wszystkich, jeśli mają być podawane równolegle. Możesz też dodać obraz do istniejących koktajli. Nieaktywne koktajle nie będą widoczne w makerze. Jeśli włączysz "Bezalkoholowy", dostępna też będzie wersja bezalkoholowa.'
  ingredient_must_be_handadd:
    en: 'Ingredient must be configured as hand add (set checkbox) when using other units than ml. This is because the machine only supports ml as output unit.'
    de: 'Zutat muss als per Hand hinzufügen konfiguriert sein (Checkbox setzen), wenn andere Einheiten als ml verwendet werden. Dies liegt daran, dass die Maschine nur ml als Ausgabeeinheit unterstützt.'
    pl: 'Składnik musi być ustawiony jako ręczne dodawanie (checkbox), jeśli używane są inne jednostki niż ml. Maszyna obsługuje tylko ml jako jednostkę wyjściową.'
