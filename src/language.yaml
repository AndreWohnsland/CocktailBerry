      pl: 'Aktywuje ustawienia deweloperskie'
    UI_MASTERPASSWORD:
      en: 'Password for critical actions and to get to settings, use 0 for no password'
      de: 'Passwort für kritische Aktionen und um zu den Einstellungen zu kommen, verwende 0 um kein Passwort zu verwenden'
      pl: 'Hasło do ustawień i akcji krytycznych, użyj 0 aby wyłączyć hasło'
    UI_MAKER_PASSWORD:
      en: 'Password for tabs other than the maker one, use 0 for no password'
      de: 'Passwort alle Tabs, außer den Maker Tab, verwende 0 um kein Passwort zu verwenden'
      pl: 'Hasło do zakładek innych niż Maker, użyj 0 aby wyłączyć hasło'
    UI_LOCKED_TABS:
      en: 'Tabs, which should only be accessible with the maker password, 1: Maker 2: Ingredients, 3: Recipes, 4: Bottles'
      de: 'Tabs, die nur mit dem Maker Passwort zugänglich sein sollen, 1: Maker 2: Zutaten, 3: Rezepte, 4: Flaschen'
      pl: 'Zakładki dostępne tylko z hasłem maker: 1: Maker 2: Składniki, 3: Przepisy, 4: Butelki'
    UI_LANGUAGE:
      en: 'Displayed language of the program'
      de: 'Spracheinstellung vom Programm'
      pl: 'Język programu'
    UI_WIDTH:
      en: 'Width of the application'
      de: 'Breite des Programms'
      pl: 'Szerokość aplikacji'
    UI_HEIGHT:
      en: 'Height of the application'
      de: 'Höhe des Programms'
      pl: 'Wysokość aplikacji'
    UI_PICTURE_SIZE:
      en: 'Approximate size of the picture in the maker tab, will try to scale to this size. Will use nearest size to fit a full number of pictures per row.'
      de: 'Ungefähre Größe des Bildes im Maker Tab, wird versucht auf diese Größe zu skalieren. Wird die nächste Größe verwenden, um eine ganze Anzahl an Bildern pro Reihe zu haben.'
      pl: 'Przybliżony rozmiar obrazka w zakładce Maker, system spróbuje dopasować do tej wielkości. Zostanie użyty najbliższy rozmiar, aby zmieścić pełną liczbę obrazków w rzędzie.'
    UI_ONLY_MAKER_TAB:
      en: 'Disable all other tabs than the maker one; You will only be prompted at program start if you want to go to config window with master password'
      de: 'Alle anderen Tabs als den Maker-Tab deaktivieren; Du wirst nur beim Programmstart gefragt, ob du mit dem Master-Passwort zum Konfigurationsfenster gehen möchtest'
      pl: 'Wyłącz wszystkie zakładki poza Makere. Przy starcie programu zostaniesz zapytany tylko, czy chcesz przejść do konfiguracji z hasłem głównym'
    PUMP_CONFIG:
      en: 'Setting for each dispenser: Dispenser type (DC over GPIO, DC over I2C, DC over MotorKit or Stepper), pin connected to the dispenser, volume flow in ml/s, tube volume in ml, consumption estimation method (time or weight based) and carriage position (0-100%). "DC over GPIO" and "DC over I2C" both drive relay-style dispensers (membrane, peristaltic, valves); the I2C variant additionally lets you choose the expander chip and board number. Stepper is for stepper motor driven dispensers. I2C pins start at 0-7 or 0-15 depending on the board type. "DC over MotorKit" is for DC motors connected to an Adafruit DC & Stepper Motor HAT or compatible PCA9685-based board, identified by its I2C address and motor channel (1-4).'
      de: 'Einstellung für jeden Dispenser: Dispenser-Typ (DC über GPIO, DC über I2C, DC über MotorKit oder Stepper), Pin verbunden mit dem Dispenser, Volumenstrom in ml/s, Schlauchvolumen in ml, Verbrauchsermittlung (zeit- oder gewichtsbasiert) und Schlittenposition (0-100%). "DC über GPIO" und "DC über I2C" steuern beide relais-basierte Dispenser (Membran-, Schlauchdispenser, Ventile); die I2C-Variante erlaubt zusätzlich die Wahl des Expander-Chips und der Board-Nummer. Stepper ist für Schrittmotor-betriebene Dispenser. I2C-Pins beginnen bei 0-7 oder 0-15 je nach Board-Typ. "DC über MotorKit" ist für DC-Motoren, die an ein Adafruit DC & Stepper Motor HAT oder ein kompatibles PCA9685-basiertes Board angeschlossen sind, identifiziert durch I2C-Adresse und Motorkanal (1-4).'
      pl: 'Ustawienia dla każdego dyspensera: typ dyspensera (DC over GPIO, DC over I2C, DC over MotorKit lub Stepper), pin podłączony do dyspensera, przepływ w ml/s, objętość wężyka w ml, metoda pomiaru zużycia (czasowa lub wagowa) oraz pozycja wózka (0-100%). "DC over GPIO" i "DC over I2C" obsługują dyspensery przekaźnikowe (membranowe, perystaltyczne, zawory); wariant I2C dodatkowo pozwala wybrać układ ekspandera i numer płytki. Stepper dotyczy dyspenserów z silnikiem krokowym. Piny I2C są numerowane od 0-7 lub 0-15, w zależności od typu płytki. "DC over MotorKit" przeznaczony jest dla silników DC podłączonych do Adafruit DC & Stepper Motor HAT lub kompatybilnej płytki opartej na PCA9685, identyfikowanej przez adres I2C i numer kanału silnika (1-4).'
    I2C_CONFIG:
      en: 'I2C GPIO expander configuration. Select the board type, board number (to distinguish multiple boards of the same type), enable/disable, I2C address (default 0x20) and signal inversion. Multiple boards of the same type are supported with different board numbers.'
      de: 'I2C GPIO-Expander Konfiguration. Board-Typ, Board-Nummer (um mehrere Boards des gleichen Typs zu unterscheiden), Aktivierung, I2C-Adresse (Standard 0x20) und Signalinvertierung auswählen. Mehrere Boards des gleichen Typs werden über verschiedene Board-Nummern unterstützt.'
      pl: 'Konfiguracja ekspandera GPIO I2C. Wybierz typ płytki, numer płytki (do rozróżnienia wielu płytek tego samego typu), włączenie/wyłączenie, adres I2C (domyślnie 0x20) oraz inwersję sygnału. Obsługiwane są wielokrotne płytki tego samego typu z różnymi numerami.'
    MAKER_NAME:
      en: 'Name of your CocktailBerry machine'
      de: 'Name von deiner CocktailBerry Maschine'
      pl: 'Nazwa Twojej maszyny CocktailBerry'
    MAKER_NUMBER_BOTTLES:
      en: 'Number of bottles of the machine'
      de: 'Flaschenanzahl der Maschine'
      pl: 'Liczba butelek w maszynie'
    MAKER_PREPARE_VOLUME:
      en: 'List of volume of the cocktail to prepare for the user to choose from. Using one value will result in a fixed volume.'
      de: 'Liste der Volumen des Cocktails, die der Benutzer auswählen kann. Wenn nur ein Wert gegeben ist, wird ein festes Volumen verwendet.'
      pl: 'Lista dostępnych objętości koktajlu do wyboru przez użytkownika. Jeśli podana jest jedna wartość, zostanie użyta stała objętość.'
    MAKER_SIMULTANEOUSLY_PUMPS:
      en: 'Maximum number of pumps simultaneously on'
      de: 'Maximale Pumpenanzahl, die gleichzeitig an ist'
      pl: 'Maksymalna liczba pomp działających jednocześnie'
    MAKER_CLEAN_TIME:
      en: 'Time in seconds the cleaning program is executed'
      de: 'Zeit in Sekunden, die das Reinigungsprogramm ausgeführt wird'
      pl: 'Czas w sekundach działania programu czyszczenia'
    MAKER_ALCOHOL_FACTOR:
      en: 'Value to scale alcoholic ingredients in each recipe. Use this to decrease/increase the alcohol level of all cocktails. Default is 100%'
      de: 'Skalierungsfaktor für alkoholische Zutaten in jedem Rezept. Verwende diesen, um den Alkoholgehalt aller Cocktails zu verringern/erhöhen. Standard ist 100%'
      pl: 'Wartość skalująca składniki alkoholowe w każdym przepisie. Użyj tego do zmniejszenia/zwiększenia poziomu alkoholu we wszystkich koktajlach. Domyślnie 100%'
    MAKER_PUMP_REVERSION_CONFIG:
      en: 'Configuration for pump reversion. Select "Global over GPIO" or "Global over I2C" for a shared relay pin (the I2C variant additionally lets you pick the expander chip and board number), or "Dispenser Controlled" to let each dispenser handle its own direction — dispensers that do not support reversion will skip it. Activate to enable reversion during cleaning.'
      de: 'Konfiguration für Pumpen Umkehrung. Wähle "Global über GPIO" oder "Global über I2C" für einen gemeinsamen Relais-Pin (die I2C-Variante erlaubt zusätzlich die Wahl des Expander-Chips und der Board-Nummer) oder "Dispenser Controlled", damit jeder Dispenser die Richtung selbst steuert — Dispenser ohne Unterstützung überspringen die Umkehrung. Aktivieren, um die Umkehrung beim Reinigen zu nutzen.'
      pl: 'Konfiguracja zmiany kierunku pompy. Wybierz "Global over GPIO" lub "Global over I2C" dla wspólnego pinu przekaźnika (wariant I2C dodatkowo pozwala wybrać układ ekspandera i numer płytki) lub "Dispenser Controlled", aby każdy dozownik sam kontrolował kierunek — dozowniki bez obsługi pominią odwracanie. Aktywuj, aby włączyć odwracanie podczas czyszczenia.'
    MAKER_SEARCH_UPDATES:
      en: 'Search for updates, if available internet connection'
      de: 'Sucht nach Updates, wenn Internetverbindung besteht'
      pl: 'Sprawdza dostępność aktualizacji, jeśli jest połączenie z internetem'
    MAKER_CHECK_BOTTLE:
      en: 'Checks before each cocktail if there is enough volume in the needed bottles. Aborts with a warning if there is not. Disable to ignore fill level.'
      de: 'Prüft vor dem Cocktail ob genug in den benötigten Flasche ist, bricht mit Warnung ab falls nicht. Ausschalten ignoriert Füllstand.'
      pl: 'Przed każdym koktajlem sprawdza, czy w wymaganych butelkach znajduje się wystarczająca ilość składników. W razie braku przerywa i wyświetla ostrzeżenie. Wyłączenie tej opcji ignoruje poziom napełnienia.'
    MAKER_PINS_INVERTED:
      en: 'Inverts the pin signal fo the GPIOs (on is low, off is high), needed for most relays, not used for I2C'
      de: 'Vertauscht das Pin Signal für die GPIOs (an ist low, aus ist high), benötigt von vielen Relays, nicht verwendet bei I2C'
      pl: 'Odwraca sygnał pinów GPIO (Wł to LOW, Wył to HIGH), wymagane dla większości przekaźników, nie używane dla I2C'
    MAKER_THEME:
      en: 'Color theme of the application, use custom to select your own color'
      de: 'Farbeinstellung des Programms, wähle custom aus, um es selbst zu stylen'
      pl: 'Motyw kolorystyczny aplikacji, użyj custom aby wybrać własny kolor'
    MAKER_MAX_HAND_INGREDIENTS:
      en: 'Maximum number of ingredients the user has to add by hand to consider a cocktail as possible/available'
      de: 'Maximale Anzahl an Zutaten, die der Nutzer per Hand hinzufügen muss, damit ein Cocktail als machbar/verfügbar gilt'
      pl: 'Maksymalna liczba składników dodawanych ręcznie, aby koktajl był uznany za możliwy/dostępny'
    MAKER_CHECK_INTERNET:
      en: 'Checks if machine is connected to the internet at startup'
      de: 'Prüft ob beim Programmstart eine Internetverbindung besteht'
      pl: 'Sprawdza połączenie z internetem przy starcie programu'
    MAKER_USE_RECIPE_VOLUME:
      en: 'Use recipe volume instead of scaling to defined volume. This disables scaling of cocktail amount in the maker tab.'
      de: 'Verwende Rezept Volumen anstatt Skalierung auf definiertes Volumen. Dies deaktiviert die Skalierung von Cocktail Menge im Maker Tab.'
      pl: 'Używaj objętości z przepisu zamiast skalowania do zdefiniowanej objętości. Wyłącza to skalowanie ilości koktajlu w zakładce Maker.'
    MAKER_ADD_SINGLE_INGREDIENT:
      en: 'Adds the option to also spend a single ingredient to the cocktails in the maker tab'
      de: 'Fügt eine Option zu den Cocktails in dem Maker Tab hinzu, auch einzelne Zutaten ausgeben zu können'
      pl: 'Dodaje opcję wydawania pojedynczego składnika do koktajli w zakładce Maker'
    MAKER_RANDOM_COCKTAIL:
      en: 'Adds a random cocktail tile to the maker tab that picks a surprise cocktail on prepare'
      de: 'Fügt eine Zufalls-Cocktail Kachel zum Maker Tab hinzu, die beim Zubereiten einen Überraschungscocktail wählt'
      pl: 'Dodaje kafelek Losowy koktajl w zakładce Maker, który podczas przygotowania losuje napój.'
    LED_CONFIG:
      en: 'List with config for each LED. Choose the LED type (Normal or WSLED) per entry. Normal (non-addressable): pin type, board number (# only relevant for I2C), pin, default on state, preparation state (on/off/effects). WSLED (WS281x, addressable, GPIO only): pin, brightness, LED count, number of daisy chained rings, default on state, preparation state.'
      de: 'Liste mit Einstellung für jeden LED. Wähle den LED-Typ pro Eintrag (Normal oder WSLED). Normal (nicht ansteuerbar): Pin-Typ, Board-Nummer (# nur relevant für I2C), Pin, Standard an-Zustand, Zustand bei Zubereitung (an/aus/Effekte). WSLED (WS281x, ansteuerbar, nur GPIO): Pin, Helligkeit, LED-Anzahl, Anzahl in Serie verbundener Ringe, Standard an-Zustand, Zustand bei Zubereitung.'
      pl: 'Lista konfiguracji dla każdej diody LED. Wybierz typ LED (Normal lub WSLED) dla każdej pozycji. Normal (nieadresowalne): typ pinu, numer płytki (# tylko dla I2C), pin, domyślny stan, stan podczas przygotowania (on/off/efekty). WSLED (WS281x, adresowalne, tylko GPIO): pin, jasność, liczba LED, liczba połączonych pierścieni, domyślny stan, stan podczas przygotowania.'
    RFID_CONFIG:
      en: 'RFID reader configuration: select the reader type (MFRC522 via SPI or USB) and enable/disable. USB readers only return tag IDs and do not support writing or reading data on tags.'
      de: 'RFID-Reader-Konfiguration: Wähle den Reader-Typ (MFRC522 über SPI oder USB) und aktiviere/deaktiviere ihn. USB-Reader liefern nur Tag-IDs und unterstützen kein Schreiben oder Lesen von Daten auf Tags.'
      pl: 'Konfiguracja czytnika RFID: wybierz typ czytnika (MFRC522 przez SPI lub USB) oraz włącz/wyłącz. Czytniki USB zwracają tylko ID tagu i nie obsługują zapisu ani odczytu danych na tagach.'
    MICROSERVICE_ACTIVE:
      en: 'Activates the interaction with the microservice'
      de: 'Aktiviert die Interaktion mit dem Microservice'
      pl: 'Aktywuje interakcję z mikrousługą'
    MICROSERVICE_BASE_URL:
      en: 'URL address for the microservice'
      de: 'URL Adresse des Microservice'
      pl: 'Adres URL mikrousługi'
    TEAMS_ACTIVE:
      en: 'Activates the team function'
      de: 'Aktiviert die Team Funktion'
      pl: 'Aktywuje funkcję Zespół'
    TEAM_BUTTON_NAMES:
      en: 'Names of the teams'
      de: 'Name der Teams'
      pl: 'Nazwy zespołu'
    TEAM_API_URL:
      en: 'URL address for teams API'
      de: 'URL Adresse der Teams API'
      pl: 'Adres URL API zespołu'
    PAYMENT_TYPE:
      en: 'Type of payment integration to use; official CocktailBerry Payment service (NFC) or SumUp'
      de: 'Art der Zahlungsintegration, die verwendet werden soll; offizieller CocktailBerry Zahlungsservice (NFC) oder SumUp'
      pl: 'Typ integracji płatności. Oficjalny serwis CocktailBerry (NFC) lub SumUp'
    PAYMENT_PRICE_ROUNDING:
      en: 'Rounding for payment prices, round up to next multiple of number, e.g. 0.25 will round 3.60 to 3.75; 1.00 will round 3.33 to 4.00'
      de: 'Rundung für Zahlungsbeträge, runde auf das nächste Vielfache der Zahl auf, z.B. 0,25 rundet 3,60 auf 3,75; 1,00 rundet 3,33 auf 4,00'
      pl: 'Zaokrąglanie cen płatności do najbliższej wielokrotności, np. 0.25 zmienia 3.60 na 3.75; 1.00 zmienia 3.33 na 4.00'
    PAYMENT_VIRGIN_MULTIPLIER:
      en: 'Multiplier percentage to apply to virgin cocktail prices'
      de: 'Multiplikator Prozentsatz, der auf Preise für alkoholfreie Cocktails angewendet wird'
      pl: 'Mnożnik procentowy stosowany do cen koktajli bezalkoholowych'
    PAYMENT_TIMEOUT_S:
      en: 'Timeout in seconds before reader cancels the payment scan'
      de: 'Timeout in Sekunden bevor der Leser den Zahlungs-Scan abbricht'
      pl: 'Czas w sekundach przed anulowaniem skanowania płatności'
    PAYMENT_SHOW_NOT_POSSIBLE:
      en: 'Show cocktails that are not possible to the user (missing balance, no alcohol allowed, etc.) in a disabled style'
      de: 'Zeige Cocktails an, die für den Benutzer nicht möglich sind (zu wenig Guthaben, kein Alkohol erlaubt, etc.) in deaktiviertem Stil'
      pl: 'Pokazuj niedostępne koktajle (brak środków, brak alkoholu itp.) w wyszarzonym stylu'
    PAYMENT_LOCK_SCREEN_NO_USER:
      en: 'Show lock screen if no user is detected on payment NFC/RFID scan'
      de: 'Zeige Sperrbildschirm an, wenn kein Benutzer bei Zahlung per NFC/RFID erkannt wird'
      pl: 'Pokazuj ekran blokady, gdy nie wykryto użytkownika przy skanowaniu NFC/RFID'
    PAYMENT_SERVICE_URL:
      en: 'URL address for the CocktailBerry payment service API'
      de: 'URL Adresse der CocktailBerry Zahlungsservice API'
      pl: 'Adres URL API serwisu płatności CocktailBerry'
    PAYMENT_SECRET_KEY:
      en: 'Secret key for the CocktailBerry payment service API'
      de: 'Geheimer Schlüssel für die CocktailBerry Zahlungsservice API'
      pl: 'Tajny klucz API serwisu płatności CocktailBerry'
    PAYMENT_SUMUP_API_KEY:
      en: 'API key for SumUp payment integration'
      de: 'API Schlüssel für SumUp Zahlungsintegration'
      pl: 'Klucz API integracji SumUp'
    PAYMENT_SUMUP_MERCHANT_CODE:
      en: 'Merchant code for SumUp payment integration'
      de: 'Händlercode für SumUp Zahlungsintegration'
      pl: 'Kod sprzedawcy SumUp'
    PAYMENT_SUMUP_TERMINAL_ID:
      en: 'Terminal ID for SumUp payment integration (usually auto-managed over setup UI)'
      de: 'Terminal ID für SumUp Zahlungsintegration (üblicherweise automatisch über Setup UI verwaltet)'
      pl: 'ID terminala SumUp (zwykle zarządzane automatycznie przez UI)'
    PAYMENT_AUTO_LOGOUT_TIME_S:
      en: 'Auto logout time in seconds for user information (scanned NFC/RFID), use 0 to disable'
      de: 'Automatische Abmeldezeit in Sekunden für Benutzerinformationen (gescannte NFC/RFID), verwende 0 zum Deaktivieren'
      pl: 'Czas automatycznego wylogowania w sekundach dla danych użytkownika (NFC/RFID), 0 wyłącza'
    PAYMENT_LOGOUT_AFTER_PREPARATION:
      en: 'Remove user information (used for cocktail display filter) after cocktail preparation, lock screen if enabled'
      de: 'Entferne Benutzerinformationen (für Cocktail Anzeigefilter verwendet) nach der Cocktail Zubereitung, Sperrbildschirm wenn aktiviert'
      pl: 'Usuwa dane użytkownika po przygotowaniu koktajlu, blokuje ekran jeśli aktywne'
    WAITER_MODE:
      en: 'Enables the service personnel mode, requiring NFC scan before cocktail preparation. Needs an NFC/RFID reader to be configured.'
      de: 'Aktiviert den Servicepersonal-Modus, der einen NFC-Scan vor der Cocktail Zubereitung erfordert. Ein NFC/RFID-Leser muss konfiguriert sein.'
      pl: 'Włącza tryb obsługi, wymagający skanowania NFC przed przygotowaniem koktajlu. Wymaga czytnika NFC/RFID.'
    WAITER_LOGOUT_AFTER_COCKTAIL:
      en: 'Automatically log out the service personnel after a cocktail has been prepared'
      de: 'Servicepersonal nach der Cocktail Zubereitung automatisch abmelden'
      pl: 'Automatycznie wyloguj personel po przygotowaniu koktajlu'
    WAITER_AUTO_LOGOUT_S:
      en: 'Time in seconds before the service personnel is automatically logged out, use 0 to disable'
      de: 'Zeit in Sekunden bis das Servicepersonal automatisch abgemeldet wird, verwende 0 zum Deaktivieren'
      pl: 'Czas w sekundach do automatycznego wylogowania personelu, 0 wyłącza'
    CUSTOM_COLOR_PRIMARY:
      en: 'Custom primary (most elements) color if custom theme is selected'
      de: 'Eigene primäre (meisten Elemente) Farbe, wenn custom Theme ausgewählt ist'
      pl: 'Własny kolor główny (większość elementów) dla motywu custom'
    CUSTOM_COLOR_SECONDARY:
      en: 'Custom secondary (active, hover) color if custom theme is selected'
      de: 'Eigene sekundäre (aktiv, hover) Farbe, wenn custom Theme ausgewählt ist'
      pl: 'Własny kolor drugorzędny (aktywny/hover) dla motywu custom'
    CUSTOM_COLOR_NEUTRAL:
      en: 'Custom neutral (inactive, subtle) color if custom theme is selected'
      de: 'Eigene neutrale (inaktiv, subtile) Farbe, wenn custom Theme ausgewählt ist'
      pl: 'Własny kolor neutralny (nieaktywny) dla motywu custom'
    CUSTOM_COLOR_BACKGROUND:
      en: 'Custom background color if custom theme is selected'
      de: 'Eigene Hintergrundfarbe, wenn custom Theme ausgewählt ist'
      pl: 'Własny kolor tła dla motywu custom'
    CUSTOM_COLOR_DANGER:
      en: 'Custom danger (e.g. delete) color if custom theme is selected'
      de: 'Eigene Gefahr (z.B. löschen) Farbe, wenn custom Theme ausgewählt ist'
      pl: 'Własny kolor ostrzegawczy (np. usuwanie) dla motywu custom'
    EXP_MAKER_UNIT:
      en: 'Unit to show in the maker tab for volume'
      de: 'Anzeigeeinheit der Volumen im Maker Tab'
      pl: 'Jednostka objętości w zakładce Maker'
    EXP_MAKER_FACTOR:
      en: 'Multiplication factor for the displayed volumes in the maker tab'
      de: 'Multiplikationsfaktor für die angezeigten Volumen im Maker Tab'
      pl: 'Współczynnik skalowania wyświetlanych objętości w Maker'
    EXP_DEMO_MODE:
      en: 'Set the API into demo mode (no destructive actions)'
      de: 'Setze die API in den Demo Modus (keine destruktiven Aktionen)'
      pl: 'Ustaw API w tryb demo (bez działań nieodwracalnych)'
    SCALE_CONFIG:
      en: 'Scale hardware configuration: driver type, enable/disable and calibration factor for weight-based measurement'
      de: 'Waagen-Konfiguration: Treibertyp, Aktivierung und Kalibrierungsfaktor für gewichtsbasierte Messung'
      pl: 'Konfiguracja wagi: typ sterownika, włączenie i kalibracja dla pomiaru wagowego'
    CARRIAGE_CONFIG:
      en: 'Carriage/slide hardware configuration: driver type, enable/disable, home position (0-100%), movement speed (%/s) and whether to move during cleaning'
      de: 'Schlitten-Konfiguration: Treibertyp, Aktivierung, Startposition (0-100%), Geschwindigkeit (%/s) und ob während der Reinigung bewegt werden soll'
      pl: 'Konfiguracja wózka: typ sterownika, włączenie, pozycja startowa (0-100%), prędkość (%/s) i ruch podczas czyszczenia'

