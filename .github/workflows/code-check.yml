name: Code Check
run-name: 🔍 Code check — ${{ github.event.pull_request.title || 'manual run' }}

on:
  pull_request:
  workflow_dispatch:

env:
  CC: gcc
  CXX: g++

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: 🔍 Lint with ruff
        run: uv run --no-group pi-hardware ruff check src

  ty:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: 🔍 Type Checking with ty
        run: uv run --extra v1 --no-group pi-hardware ty check src

  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: 🔍 Run PyTest
        run: uv run --no-group pi-hardware pytest

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔍 Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            docs/**
            zensical.toml

      - name: Install the latest version of uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"

      - name: 🔍 Build docs (strict)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv run --no-group pi-hardware zensical build --strict

  check-web-client:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔍 Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: web_client/**

      - name: Setup Node
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Enable Corepack
        if: steps.changed-files.outputs.any_changed == 'true'
        run: corepack enable

      - name: Run install
        if: steps.changed-files.outputs.any_changed == 'true'
        run: yarn install --immutable
        working-directory: web_client

      - name: Run lint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: yarn lint
        working-directory: web_client

      - name: verify build succeeds
        if: steps.changed-files.outputs.any_changed == 'true'
        run: yarn build
        working-directory: web_client
