name: Build React App and Add to Release
run-name: ⚛️ Build web client — ${{ github.event.release.tag_name || 'manual run' }}

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions: {}

jobs:
  verify-version:
    # Only relevant for releases (this workflow also runs on workflow_dispatch).
    if: github.event_name == 'release'
    permissions:
      # The guard re-drafts the release and deletes the tag on version mismatch.
      contents: write
    uses: ./.github/workflows/verify-release-version.yml

  build-and-upload:
    needs: verify-version
    permissions:
      contents: write
    # Run after a successful guard (release) or when the guard was skipped
    # (workflow_dispatch); skip only when the guard actually failed.
    if: ${{ always() && needs.verify-version.result != 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: ./web_client

      - name: Build React App
        run: yarn build
        working-directory: ./web_client

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cocktailberry_web_client
          path: ./web_client/dist

      - name: Compress Build Folder
        if: github.event_name == 'release'
        run: tar -czvf cocktailberry_web_client.tar.gz -C ./web_client/dist .

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: cocktailberry_web_client.tar.gz
          asset_name: cocktailberry_web_client.tar.gz
          tag: ${{ github.event.release.tag_name }}
