name: Build React App and Add to Release
run-name: |
  Build React App${{ github.event_name == 'release' && ' and add to Release' || '' }}

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  verify-version:
    # Only relevant for releases (this workflow also runs on workflow_dispatch).
    if: github.event_name == 'release'
    uses: ./.github/workflows/verify-release-version.yml

  build-and-upload:
    needs: verify-version
    # Run after a successful guard (release) or when the guard was skipped
    # (workflow_dispatch); skip only when the guard actually failed.
    if: ${{ always() && needs.verify-version.result != 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: ./web_client

      - name: Build React App
        run: yarn build
        working-directory: ./web_client

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cocktailberry_web_client
          path: ./web_client/dist

      - name: Compress Build Folder
        if: github.event_name == 'release'
        run: tar -czvf cocktailberry_web_client.tar.gz -C ./web_client/dist .

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: cocktailberry_web_client.tar.gz
          asset_name: cocktailberry_web_client.tar.gz
          tag: ${{ github.event.release.tag_name }}
