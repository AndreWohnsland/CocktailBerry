name: Build Demo App on GitHub Pages
run-name: 🌐 Deploy demo page — ${{ github.event.release.tag_name || 'manual run' }}

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # only checkout the client folder
          sparse-checkout: web_client
          sparse-checkout-cone-mode: false

      - name: Move mobile app files to root
        run: |
          ls -lah
          shopt -s dotglob
          mv web_client/* .
          rm -rf web_client
          ls -lah

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Run install
        run: yarn install --immutable

      - name: Build production bundle
        run: yarn build-demo

      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: demo-pages
          cname: demo.cocktailberry.org
