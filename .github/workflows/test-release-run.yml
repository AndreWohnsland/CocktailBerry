name: Smoke Test the setup script on the runner
run-name: 🧪 Smoke test — ${{ github.event.head_commit.message || 'manual run' }}

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CC: gcc
  CXX: g++

permissions:
  contents: read

jobs:
  install-CocktailBerry:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.13"
      - name: Run setup.sh
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh cicd
      - name: Start API
        run: |
          uv sync
          uv run api.py & sleep 5
      - name: Test API
        run: |
          for i in {1..6}; do
            response=$(curl -s -X 'GET' 'http://localhost:8000/api/' -H 'accept: application/json')
            echo "Response: $response"
            if echo "$response" | grep -q '{"message":"Welcome to CocktailBerry, this API works!"}'; then
              echo "API is working correctly"
              pkill -f "uv run api.py"
              exit 0
            fi
            sleep 5
          done
          echo "API did not respond correctly"
          pkill -f "uv run api.py"
          exit 1
