name: Update version, build & publish CocktailBerry images
run-name: 🐳 Release build — ${{ github.event.release.tag_name }}

on:
  release:
    types: [published]

jobs:
  verify-version:
    permissions:
      # The guard re-drafts the release and deletes the tag on version mismatch.
      contents: write
    uses: ./.github/workflows/verify-release-version.yml

  build-and-push-image:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./microservice/Dockerfile
            image: andrewo92/cocktailberry-microservice
            context: ./microservice
          - dockerfile: ./dashboard/Dockerfile.backend
            image: andrewo92/cocktailberry-dashboard-be
            context: ./dashboard
          - dockerfile: ./dashboard/Dockerfile.frontend
            image: andrewo92/cocktailberry-dashboard-fe
            context: ./dashboard
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🐳 Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⛏️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 🍸 Build and push Docker image CocktailBerry
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # pull keeps base images fresh while still using the layer cache
          pull: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
