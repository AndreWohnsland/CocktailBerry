name: Update version, build & publish CocktailBerry images
run-name: "Version: ${{ github.event.release.tag_name }}, build and publish images"
on:
  release:
    types: [ published ]

jobs:
  verify-version:
    uses: ./.github/workflows/verify-release-version.yml

  build-and-push-image:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./microservice/Dockerfile
            image: andrewo92/cocktailberry-microservice
            context: ./microservice
          - dockerfile: ./dashboard/Dockerfile.backend
            image: andrewo92/cocktailberry-dashboard-be
            context: ./dashboard
          - dockerfile: ./dashboard/Dockerfile.frontend
            image: andrewo92/cocktailberry-dashboard-fe
            context: ./dashboard
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Log in to the Container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⛏️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 🍸 Build and push Docker image CocktailBerry
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
