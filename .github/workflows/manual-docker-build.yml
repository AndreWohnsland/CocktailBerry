name: Manual Build & publish
run-name: 🐳 Build ${{ inputs.service }}:${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version of the image"
        required: true
        default: "latest"
      service:
        description: "Service to build"
        required: true
        type: choice
        options:
          - backend
          - frontend
          - service
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🗺️ Resolve build target
        id: target
        run: |
          case "${{ inputs.service }}" in
            service)
              CONTEXT=./microservice
              FILE=./microservice/Dockerfile
              IMAGE=andrewo92/cocktailberry-microservice
              ;;
            backend)
              CONTEXT=./dashboard
              FILE=./dashboard/Dockerfile.backend
              IMAGE=andrewo92/cocktailberry-dashboard-be
              ;;
            frontend)
              CONTEXT=./dashboard
              FILE=./dashboard/Dockerfile.frontend
              IMAGE=andrewo92/cocktailberry-dashboard-fe
              ;;
          esac
          {
            echo "context=$CONTEXT"
            echo "file=$FILE"
            echo "image=$IMAGE"
          } >> "$GITHUB_OUTPUT"

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 🐳 Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🍸 Build and push Docker image CocktailBerry
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ steps.target.outputs.context }}
          file: ${{ steps.target.outputs.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.target.outputs.image }}:latest,${{ steps.target.outputs.image }}:${{ inputs.version }}
          # pull keeps base images fresh while still using the layer cache
          pull: true
          cache-from: type=gha,scope=${{ steps.target.outputs.image }}
          cache-to: type=gha,mode=max,scope=${{ steps.target.outputs.image }}
