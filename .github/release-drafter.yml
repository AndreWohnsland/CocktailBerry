---
name-template: 'v$RESOLVED_VERSION 🌈'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
sort-direction: ascending
exclude-labels:
  - 'skip-changelog'

categories:
  - title: '🚨 Breaking changes'
    labels:
      - 'breaking-change'
  - title: '🆕 New Features of this Release'
    labels:
      - 'new-feature'
  - title: '💎 Improvements'
    labels:
      - 'enhancement'
      - 'refactor'
      - 'performance'
      - 'improvement'
  - title: '🐛 Bug fixes'
    labels:
      - 'bugfix'
  - title: '🧰 Maintenance'
    labels:
      - 'maintenance'
      - 'ci'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
  - title: '⬆️ Dependency updates'
    labels:
      - 'dependencies'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'new-feature'
  patch:
    labels:
      - 'bugfix'
      - 'chore'
      - 'ci'
      - 'dependencies'
      - 'documentation'
      - 'enhancement'
      - 'performance'
      - 'refactor'
  default: patch

template: |
  $CHANGES
