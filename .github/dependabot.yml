version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    labels:
      - dependencies
      - skip-changelog
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /
    labels:
      - dependencies
      - skip-changelog
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
